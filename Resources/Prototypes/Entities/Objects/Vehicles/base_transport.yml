- type: entity
  id: BaseTransport
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: Transport
    maxPassengers: 2
    maxItemSlots: 0
    requireKey: true
    seatOffsets:
    - "0,0.15"
    - "0,-0.15"
  - type: Sprite
    sprite: Objects/Vehicles/atv.rsi
    state: vehicle
    noRot: true
  - type: Strap
    id: seat
    position: Stand
    size: 200
- type: entity
  id: TransportCart
  parent: BaseTransport
  name: cart
  description: A simple two-seat transport.
  components:
  - type: Transport
    keyId: cart
