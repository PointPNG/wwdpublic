- type: entity
  id: BaseTransport
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: Transport
    maxPassengers: 2
    maxItemSlots: 0
    requireKey: true
  - type: Sprite
    sprite: Objects/Vehicles/atv.rsi
    state: vehicle
    noRot: true
  - type: Strap
    id: driverSeat
    position: Stand
    buckleOffset: "0,0.15"
  - type: Strap
    id: passengerSeat
    position: Stand
    buckleOffset: "0,-0.15"
- type: entity
  id: TransportCart
  parent: BaseTransport
  name: cart
  description: A simple two-seat transport.
  components:
  - type: Transport
    keyId: cart
